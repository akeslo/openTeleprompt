<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Teleprompter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="island">

    <!-- IDLE -->
    <div id="view-idle" class="view active">
      <div class="idle-inner">
        <span class="idle-dot" id="idle-dot"></span>
        <span class="idle-label">Teleprompter</span>
        <button class="idle-btn" id="btn-open">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- ── EDIT: expanded, paste script ── -->
    <div id="view-edit" class="view">
      <div class="edit-header">
        <button class="pill-btn ghost" id="btn-collapse">✕</button>
        <span class="view-title">Script</span>
        <button class="pill-btn ghost" id="btn-new-script">+ New</button>
        <button class="pill-btn ghost" id="btn-save">Save</button>
        <button class="pill-btn ghost icon-btn" id="btn-settings" title="Settings">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
        <button class="pill-btn accent" id="btn-start">Go →</button>
      </div>
      <div id="script-list"></div>
      <textarea id="script-input" placeholder="Paste your script here…" spellcheck="false"></textarea>
      <div id="script-stats"></div>
    </div>

    <!-- ── READ: scrolling teleprompter ── -->
    <div id="view-read" class="view">
      <div id="progress-bar"></div>
      <div id="countdown-overlay"><span id="countdown-num">3</span></div>

      <div id="scroll-viewport">
        <div id="script-text"></div>
      </div>

      <div id="vol-meter-wrap">
        <div id="vol-bar"></div>
        <span id="vol-label">0 dB</span>
      </div>

      <div id="read-controls">
        <div class="ctrl-left">
          <span class="mic-ring" id="mic-ring"><span class="mic-core"></span></span>
          <span id="status-text">Listening</span>
        </div>
        <div class="ctrl-right">
          <button class="ctrl-btn" id="btn-font-down" title="Decrease font">A−</button>
          <button class="ctrl-btn" id="btn-font-up"   title="Increase font">A+</button>
          <button class="ctrl-btn" id="btn-slower">−</button>
          <span id="speed-val">1×</span>
          <button class="ctrl-btn" id="btn-faster">+</button>
          <button class="ctrl-btn" id="btn-pause" title="Space to pause">⏸</button>
          <button class="ctrl-btn" id="btn-back">↺</button>
          <button class="ctrl-btn" id="btn-done">✕</button>
        </div>
      </div>
    </div>

  </div>
  <script src="app.js"></script>
</body>
</html>
