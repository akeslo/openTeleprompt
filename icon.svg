<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg512" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0e0e10"/>
      <stop offset="100%" stop-color="#18181c"/>
    </linearGradient>
    <linearGradient id="pillGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="dotGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dotglow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg512)"/>

  <!-- Notch pill at top center -->
  <rect x="176" y="52" width="160" height="44" rx="22" fill="url(#pillGrad)" filter="url(#glow)"/>

  <!-- Green dot inside pill -->
  <circle cx="256" cy="74" r="10" fill="url(#dotGrad)" filter="url(#dotglow)"/>

  <!-- Text lines -->
  <rect x="80" y="148" width="352" height="18" rx="9" fill="rgba(255,255,255,0.85)"/>
  <rect x="80" y="184" width="320" height="18" rx="9" fill="rgba(255,255,255,0.6)"/>
  <rect x="80" y="220" width="336" height="18" rx="9" fill="rgba(255,255,255,0.4)"/>
  <rect x="80" y="256" width="260" height="18" rx="9" fill="rgba(255,255,255,0.25)"/>
  <rect x="80" y="292" width="300" height="18" rx="9" fill="rgba(255,255,255,0.15)"/>
  <rect x="80" y="328" width="280" height="18" rx="9" fill="rgba(255,255,255,0.08)"/>

  <!-- Sound wave bars -->
  <rect x="208" y="400" width="14" height="48" rx="7" fill="url(#lineGrad)"/>
  <rect x="230" y="384" width="14" height="64" rx="7" fill="url(#lineGrad)"/>
  <rect x="252" y="372" width="14" height="80" rx="7" fill="url(#lineGrad)"/>
  <rect x="274" y="384" width="14" height="64" rx="7" fill="url(#lineGrad)"/>
  <rect x="296" y="400" width="14" height="48" rx="7" fill="url(#lineGrad)"/>
</svg>
